<head>
<meta charset="UTF-8">

<title>たねまき アプリのたな</title>

<style>
:root {
  /* 親向けページ基調（design.md §8） */
  --bg:     #FFF8EF;
  --panel:  #ffffff;
  --main:   #4DBCBC;
  --accent: #F7931E;
  --ink:    #3C2415;
  --sub:    #7a685f;
  /* カテゴリ色（テーマGのやわらか原色） */
  --c-kazu:    #4dabf7;
  --c-keisan:  #51cf66;
  --c-tokei:   #F7931E;
  --c-hakaru:  #4DBCBC;
  --gold:      #ffd166;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: "Hiragino Maru Gothic ProN", "Yu Gothic Medium", "Noto Sans JP", system-ui, sans-serif;
}
.wrap { max-width: 520px; margin: 0 auto; padding: 0 14px 110px; }

/* ヘッダー */
header { text-align: center; padding: 22px 0 4px; }
header h1 { font-size: 24px; font-weight: 800; letter-spacing: .04em; }
header h1 .seed { color: var(--accent); }
header p { font-size: 12px; color: var(--sub); margin-top: 4px; }

/* 検索 */
.searchbox { position: relative; margin: 14px 0 10px; }
.searchbox input {
  width: 100%; padding: 12px 14px 12px 42px;
  border: 2px solid var(--main); border-radius: 999px;
  font-size: 16px; font-family: inherit; color: var(--ink);
  background: var(--panel); outline: none;
}
.searchbox input:focus { border-color: var(--accent); }
.searchbox .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; }

/* タブ */
.tabs { display: flex; gap: 8px; overflow-x: auto; padding: 6px 2px 10px; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 0 0 auto; border: none; cursor: pointer;
  padding: 9px 16px; border-radius: 999px;
  font-family: inherit; font-size: 15px; font-weight: 800; color: #fff;
  box-shadow: 0 2px 0 rgba(0,0,0,.15);
  opacity: .45; transition: opacity .15s, transform .05s;
}
.tab.active { opacity: 1; }
.tab:active { transform: translateY(1px); box-shadow: 0 1px 0 rgba(0,0,0,.15); }
.tab .n { font-size: 11px; font-weight: 700; opacity: .85; margin-left: 3px; }
.tab-all    { background: var(--ink); }
.tab-kazu   { background: var(--c-kazu); }
.tab-keisan { background: var(--c-keisan); }
.tab-tokei  { background: var(--c-tokei); }
.tab-hakaru { background: var(--c-hakaru); }

/* カード */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.card {
  display: block; text-decoration: none; color: var(--ink);
  background: var(--panel); border-radius: 16px;
  padding: 14px 12px 12px; position: relative;
  border-top: 5px solid var(--gold);
  box-shadow: 0 2px 6px rgba(60,36,21,.08);
  transition: transform .05s;
}
.card:active { transform: translateY(2px); }
.card.cat-kazu   { border-top-color: var(--c-kazu); }
.card.cat-keisan { border-top-color: var(--c-keisan); }
.card.cat-tokei  { border-top-color: var(--c-tokei); }
.card.cat-hakaru { border-top-color: var(--c-hakaru); }
.card .emoji { font-size: 30px; line-height: 1; }
.card .name { font-size: 15px; font-weight: 800; line-height: 1.35; margin-top: 6px; }
.card .desc { font-size: 12px; color: var(--sub); line-height: 1.45; margin-top: 4px; }
.card .age {
  position: absolute; top: 10px; right: 10px;
  background: var(--gold); color: var(--ink);
  font-size: 11px; font-weight: 800;
  padding: 3px 8px; border-radius: 999px;
}
.badges { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
.chip {
  font-size: 10px; font-weight: 700; color: var(--sub);
  background: var(--bg); border-radius: 999px; padding: 2px 7px;
}
.chip.special { color: #fff; background: var(--accent); }

.empty { text-align: center; color: var(--sub); font-size: 14px; padding: 40px 0; display: none; }
.empty .big { font-size: 40px; margin-bottom: 8px; }

/* 個別サポボタン（常設） */
.support {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
  padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
  background: linear-gradient(to top, var(--bg) 70%, rgba(255,248,239,0));
  display: flex; justify-content: center;
}
.support a {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; max-width: 492px; min-height: 52px;
  background: var(--main); color: #fff; text-decoration: none;
  font-size: 16px; font-weight: 800; border-radius: 999px;
  box-shadow: 0 5px 12px rgba(0,0,0,.16);
  transition: transform .05s;
}
.support a:active { transform: translateY(2px); box-shadow: 0 2px 6px rgba(0,0,0,.16); }
.support a .small { font-size: 11px; font-weight: 700; opacity: .9; }

footer { text-align: center; font-size: 11px; color: var(--sub); padding: 26px 0 8px; }
</style>

// ── 表示 ─────────────────────────────
const grid = document.getElementById('grid');
const tabsEl = document.getElementById('tabs');
const emptyEl = document.getElementById('empty');
const searchEl = document.getElementById('search');
let activeCat = 'all';

// カタカナ→ひらがな正規化（検索用）
function norm(s) {
  return (s || '').toLowerCase()
    .replace(/[ァ-ヶ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60))
    .replace(/[\s　]/g, '');
}

function haystack(app) {
  return norm([app.name, app.desc, ...(app.kw||[]), ...(app.chikara||[]), ...(app.tsumazuki||[])].join(' '));
}

function renderTabs() {
  const counts = { all: APPS.length };
  for (const a of APPS) counts[a.cat] = (counts[a.cat] || 0) + 1;
  let html = `<button class="tab tab-all ${activeCat==='all'?'active':''}" data-cat="all">ぜんぶ<span class="n">${counts.all}</span></button>`;
  for (const [key, c] of Object.entries(CATS)) {
    html += `<button class="tab tab-${key} ${activeCat===key?'active':''}" data-cat="${key}">${c.label}<span class="n">${counts[key]||0}</span></button>`;
  }
  tabsEl.innerHTML = html;
}

function render() {
  const q = norm(searchEl.value);
  const shown = APPS.filter(a =>
    (activeCat === 'all' || a.cat === activeCat) &&
    (!q || haystack(a).includes(q))
  );
  grid.innerHTML = shown.map(a => `
    <a class="card cat-${a.cat}" href="${a.url}" target="_blank" rel="noopener">
      <span class="age">${a.age}さい〜</span>
      <div class="emoji">${a.emoji}</div>
      <div class="name">${a.name}</div>
      <div class="desc">${a.desc}</div>
      <div class="badges">
        ${a.song ? '<span class="chip special">♪ うた</span>' : ''}
        ${a.demo ? '<span class="chip special">おやこで</span>' : ''}
        ${(a.chikara||[]).slice(0,2).map(t => `<span class="chip">${t}</span>`).join('')}
      </div>
    </a>`).join('');
  emptyEl.style.display = shown.length ? 'none' : 'block';
}

tabsEl.addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  activeCat = btn.dataset.cat;
  renderTabs();
  render();
});
searchEl.addEventListener('input', render);

renderTabs();
render();
</script>
